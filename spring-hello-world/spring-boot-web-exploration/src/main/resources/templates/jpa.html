<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link th:replace="fragments/navigation.html :: bs"/>
</head>
<body>

<nav
        th:replace="fragments/navigation.html :: navigation"/>

<h1>JPA</h1>

<table class="table">
    <thead>
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Email</th>
        <th>Created At</th>
        <th>Password Hash</th>
        <th>&nbsp;</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.getId()}"/>
        <td th:text="${user.getName()}"/>
        <td th:text="${user.getEmail()}"/>
        <td th:text="${user.getCreatedAt()}"/>
        <td th:text="${user.getPasswordHash()}"/>
        <td>
            <a
                    class="btn btn-success btn-sm"
                    th:href="@{/jpa/edit/{id}(id=${user.getId()})}">
                Edit
            </a>
            <a
                class="btn btn-danger btn-sm"
                th:href="@{/jpa/delete/{id}(id=${user.getId()})}">
                Delete
            </a>



        </td>
    </tr>

    </tbody>
</table>



<div th:replace="fragments/navigation.html :: footer"/>
</body>
</html>
