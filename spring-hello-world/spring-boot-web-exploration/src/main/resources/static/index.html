<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<h1>User List</h1>



<table id="tblUsers">
    <thead>
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Email</th>
        <th>Active</th>
    </tr>
    </thead>
    <tbody>

    </tbody>
</table>

<script src="js/script.js"></script>

<script>
    fetch("/users")
        .then(resp=>resp.json())
        .then(users=>{
            let trs = users.map(user=>`<tr>
                                            <td>${user.id}</td>
                                            <td>${user.name}</td>
                                            <td>${user.email}</td>
                                            <td>${user.active ? "Active" : "Inactive"}</td>
                                       </tr>`);

            document.querySelector("#tblUsers tbody").innerHTML = trs.join("");
        });
</script>
</body>
</html>
